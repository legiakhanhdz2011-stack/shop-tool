<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Tool Tự Động</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        /* Kệ hàng (Grid Layout) */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .product-icon { font-size: 50px; margin-bottom: 15px; }
        .product-name { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .product-price { color: #e74c3c; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .btn-buy { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-buy:hover { background: #0056b3; }

        /* Popup Thanh Toán (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        .qr-image { width: 100%; border-radius: 10px; border: 2px solid #eee; margin: 15px 0; }
        #modal-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🛒 Gian Hàng Phần Mềm</h1>

    <div class="store-grid">
        {% for pid, item in products.items() %}
        <div class="product-card">
            <div class="product-icon">📦</div>
            <div class="product-name">{{ item.name }}</div>
            <div class="product-price">{{ "{:,.0f}".format(item.price) }} VNĐ</div>
            <button class="btn-buy" onclick="openPayment('{{ pid }}', {{ item.price }}, '{{ item.name }}')">Mua Ngay</button>
        </div>
        {% endfor %}
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">×</span>
            <h3 id="modal-title">Thanh Toán</h3>
            <p style="color: #666; font-size: 14px;">Mã đơn: <b id="display-order-id" style="color: black;"></b></p>
            
            <img id="qr-code" class="qr-image" src="" alt="Mã QR">
            
            <p style="font-size: 13px; color: #555;">Mở app ngân hàng quét mã. Cửa sổ sẽ tự tải file sau khi chuyển thành công.</p>
            
            <div id="modal-msg"></div>
        </div>
    </div>

    <script>
        let currentOrderId = "";
        let autoCheckInterval; // Biến lưu vòng lặp kiểm tra

        async function openPayment(productId, price, productName) {
            // 1. Tạo một mã đơn hàng ngẫu nhiên (Ví dụ: DH8492)
            currentOrderId = "DH" + Math.floor(1000 + Math.random() * 9000);
            
            // 2. Báo cho Backend biết khách vừa tạo đơn
            await fetch('/create-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ order_id: currentOrderId, product_id: productId })
            });

            // 3. Cập nhật thông tin lên cửa sổ Popup
            document.getElementById('modal-title').innerText = productName;
            document.getElementById('display-order-id').innerText = currentOrderId;
            
            // Hiệu ứng đang chờ thanh toán
            const msgDiv = document.getElementById('modal-msg');
            msgDiv.innerText = "⏳ Hệ thống đang tự động check...";
            msgDiv.style.color = "#f39c12"; 
            
            // 4. CHÚ Ý: NHỚ THAY 'MB-0123456789' BẰNG STK CỦA BẠN NHÉ
            // Cú pháp chuẩn: TÊN_VIẾT_TẮT_BANK-SỐ_TÀI_KHOẢN (Ví dụ: VCB-0123456789)
            const bankAccount = "MB-63498066778899"; 
            const qrUrl = `https://img.vietqr.io/image/${bankAccount}-compact2.png?amount=${price}&addInfo=${currentOrderId}`;
            document.getElementById('qr-code').src = qrUrl;

            // Hiển thị Popup
            document.getElementById('paymentModal').style.display = 'flex';

            // BẮT ĐẦU TỰ ĐỘNG KIỂM TRA MỖI 3 GIÂY (3000ms)
            if(autoCheckInterval) clearInterval(autoCheckInterval);
            autoCheckInterval = setInterval(autoCheckPayment, 3000);
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
            // Hủy vòng lặp kiểm tra nếu khách chủ động đóng cửa sổ
            if(autoCheckInterval) clearInterval(autoCheckInterval); 
        }

        // Hàm điệp viên: tự động hỏi Server liên tục
        async function autoCheckPayment() {
            try {
                const response = await fetch(`/api/check-status/${currentOrderId}`);
                const data = await response.json();

                // Nếu Server báo đã trả tiền -> Tự động nhả file
                if (data.status === "paid") {
                    clearInterval(autoCheckInterval); // Dừng vòng lặp kiểm tra lập tức
                    
                    const msgDiv = document.getElementById('modal-msg');
                    msgDiv.innerText = "✅ Đã nhận tiền! Đang tự động tải file...";
                    msgDiv.style.color = "#28a745";
                    
                    // Gọi hàm lấy file
                    executeDownload();
                }
            } catch (error) {
                console.log("Đang thử lại kết nối...");
            }
        }

        // Hàm thực thi tải file ẩn
        async function executeDownload() {
            try {
                const response = await fetch(`/download/${currentOrderId}`);
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    // Lấy tên file từ Header do Backend trả về
                    const disposition = response.headers.get('Content-Disposition');
                    const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : "downloaded_file";
                    a.download = filename;
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    // Đóng popup sau 3 giây để màn hình sạch sẽ
                    setTimeout(closeModal, 3000);
                }
            } catch (error) {
                document.getElementById('modal-msg').innerText = "Lỗi khi tải file.";
            }
        }
    </script>
</body>
</html>
